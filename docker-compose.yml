version: "3.8"

services:
  beam-api:
    build: .
    container_name: beam-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  mlflow-ui:
    build: .
    container_name: beam-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///app/mlruns
